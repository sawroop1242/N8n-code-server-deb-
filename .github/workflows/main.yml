name: Build Dioxus CLI for ARM64

on:
  workflow_dispatch:

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Dioxus Repo
        uses: actions/checkout@v4
        with:
          repository: DioxusLabs/dioxus
          # Change 'master' to 'main'
          ref: main 

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross-rs
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Dioxus CLI
        run: |
          # Use find to locate the CLI folder if the path changed
          cd packages/cli
          # Use cross to build for ARM64
          cross build --release --target aarch64-unknown-linux-gnu

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: dx-cli-arm64
          # Path to the resulting binary
          path: target/aarch64-unknown-linux-gnu/release/dx
          
          
