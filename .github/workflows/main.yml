name: Build Dioxus CLI for ARM64

on:
  workflow_dispatch: # Allows you to run this manually from the GitHub UI

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: DioxusLabs/dioxus
          ref: master # or a specific version like 'v0.5.0'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install Cross-rs
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build Dioxus CLI
        run: |
          # We move into the CLI directory within the monorepo
          cd packages/cli
          # 'cross' uses Docker to provide the ARM64 environment
          cross build --release --target aarch64-unknown-linux-gnu

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: dx-cli-arm64
          path: target/aarch64-unknown-linux-gnu/release/dx
          
